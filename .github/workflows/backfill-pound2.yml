name: Backfill Missing £2 Variants

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Stage missing £2 variants to inbox
        env:
          COINHUB_SERVICE_KEY: ${{ secrets.COINHUB_SERVICE_KEY }}
        run: node scripts/stage-missing-pound2.js
