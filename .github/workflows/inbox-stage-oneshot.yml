name: Update inbox coin images (one-shot)

on:
  workflow_dispatch:

jobs:
  update-images:
    runs-on: ubuntu-latest
    steps:
      - name: Get OAuth token
        id: token
        run: |
          TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.GOOGLE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token" | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Scrape Winnie the Pooh image
        id: wtp
        run: |
          HTML=$(curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0 Safari/537.36" \
            "https://www.westminstercollection.com/p-177L/2026-UK-Winnie-the-Pooh-Friendship-CBU-50p.aspx")
          IMG=$(echo "$HTML" | python3 -c "
          import sys, re
          html = sys.stdin.read()
          # og:image is most reliable
          m = re.search(r'<meta[^>]+property=[\"']og:image[\"'][^>]+content=[\"']([^\"']+)[\"']', html)
          if not m:
            m = re.search(r'<meta[^>]+content=[\"']([^\"']+)[\"'][^>]+property=[\"']og:image[\"']', html)
          if m:
            print(m.group(1))
          else:
            # fallback: first large product image
            m = re.search(r'https://[^\"]+(?:winnie|pooh|177)[^\"]*\.(?:jpg|jpeg|png|webp)', html, re.IGNORECASE)
            print(m.group(0) if m else '')
          ")
          echo "img=$IMG"
          echo "img=$IMG" >> $GITHUB_OUTPUT

      - name: Scrape Aardman image
        id: aard
        run: |
          # Try Change Checker search for the Aardman 50p article
          HTML=$(curl -sL -A "Mozilla/5.0" "https://www.changechecker.org/?s=aardman+50p+2026")
          IMG=$(echo "$HTML" | python3 -c "
          import sys, re
          html = sys.stdin.read()
          m = re.search(r'https://[^\"]+aardman[^\"]*\.(?:jpg|jpeg|png|webp)', html, re.IGNORECASE)
          if m:
            print(m.group(0))
          else:
            m = re.search(r'<meta[^>]+property=[\"']og:image[\"'][^>]+content=[\"']([^\"']+)[\"']', html)
            if not m:
              m = re.search(r'<meta[^>]+content=[\"']([^\"']+)[\"'][^>]+property=[\"']og:image[\"']', html)
            print(m.group(1) if m else '')
          ")
          echo "img=$IMG"
          echo "img=$IMG" >> $GITHUB_OUTPUT

      - name: Update inbox image cells
        run: |
          SHEET_ID="${{ secrets.GOOGLE_SHEET_ID }}"
          TOKEN="${{ steps.token.outputs.token }}"

          # Read inbox to find row numbers for our two coins
          INBOX=$(curl -s "https://sheets.googleapis.com/v4/spreadsheets/$SHEET_ID/values/NewCoinsInbox?majorDimension=ROWS" \
            -H "Authorization: Bearer $TOKEN")

          echo "Inbox data:"
          echo "$INBOX" | python3 -c "
          import json, sys
          rows = json.load(sys.stdin).get('values', [])
          for i, r in enumerate(rows):
            print(i+1, r[:3] if len(r)>=3 else r)
          "

          # Find row numbers (1-indexed) for each coin by variantCode (col A)
          WTP_ROW=$(echo "$INBOX" | python3 -c "
          import json, sys
          rows = json.load(sys.stdin).get('values', [])
          for i, r in enumerate(rows):
            if r and 'WTPF' in r[0]:
              print(i+1)  # 1-indexed sheet row
              break
          ")
          AARD_ROW=$(echo "$INBOX" | python3 -c "
          import json, sys
          rows = json.load(sys.stdin).get('values', [])
          for i, r in enumerate(rows):
            if r and 'AARD' in r[0]:
              print(i+1)
              break
          ")

          echo "WTP row: $WTP_ROW, AARD row: $AARD_ROW"
          WTP_IMG="${{ steps.wtp.outputs.img }}"
          AARD_IMG="${{ steps.aard.outputs.img }}"
          echo "WTP img: $WTP_IMG"
          echo "AARD img: $AARD_IMG"

          # Update image URL (column G = index 6) for each row
          if [ -n "$WTP_ROW" ] && [ -n "$WTP_IMG" ]; then
            curl -s -X PUT \
              "https://sheets.googleapis.com/v4/spreadsheets/$SHEET_ID/values/NewCoinsInbox!G${WTP_ROW}?valueInputOption=USER_ENTERED" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"values\":[[\"$WTP_IMG\"]]}"
            echo "Updated WTP image in row $WTP_ROW"
          else
            echo "Could not update WTP: row=$WTP_ROW img=$WTP_IMG"
          fi

          if [ -n "$AARD_ROW" ] && [ -n "$AARD_IMG" ]; then
            curl -s -X PUT \
              "https://sheets.googleapis.com/v4/spreadsheets/$SHEET_ID/values/NewCoinsInbox!G${AARD_ROW}?valueInputOption=USER_ENTERED" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"values\":[[\"$AARD_IMG\"]]}"
            echo "Updated Aardman image in row $AARD_ROW"
          else
            echo "Could not update Aardman: row=$AARD_ROW img=$AARD_IMG"
          fi
