name: Update inbox coin images (one-shot)

on:
  workflow_dispatch:

jobs:
  update-images:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape and update Winnie the Pooh image
        run: |
          HTML=$(curl -sL --max-time 15 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0 Safari/537.36" \
            "https://www.westminstercollection.com/p-177L/2026-UK-Winnie-the-Pooh-Friendship-CBU-50p.aspx")
          IMG=$(echo "$HTML" | python3 -c "
          import sys, re
          html = sys.stdin.read()
          for pattern in [
            r'<meta[^>]+property=[\"\\']og:image[\"\\'][^>]+content=[\"\\']([^\"\\']+)',
            r'<meta[^>]+content=[\"\\']([^\"\\']+)[\"\\'][^>]+property=[\"\\']og:image',
            r'https://[^\"\\']+(?:winnie|pooh|177)[^\"\\']*\\.(?:jpg|jpeg|png|webp)',
          ]:
            m = re.search(pattern, html, re.IGNORECASE)
            if m:
              print(m.group(1) if m.lastindex else m.group(0))
              break
          ")
          echo "WTP image: $IMG"
          if [ -n "$IMG" ]; then
            curl -s -X POST https://coins.ghghome.co.uk/api/inbox-image-update \
              -H "Content-Type: application/json" \
              -H "x-service-key: ${{ secrets.COINHUB_SERVICE_KEY }}" \
              -d "{\"variantCode\":\"UK-COMM-50P-2026-WTPF-\",\"imageUrl\":\"$IMG\"}"
          else
            echo "No image found for Winnie the Pooh"
          fi

      - name: Scrape and update Aardman image
        run: |
          # Try Change Checker search for Aardman article
          HTML=$(curl -sL --max-time 15 -A "Mozilla/5.0" \
            "https://www.changechecker.org/?s=aardman+50p")
          IMG=$(echo "$HTML" | python3 -c "
          import sys, re
          html = sys.stdin.read()
          # Find first article image related to Aardman
          m = re.search(r'https://[^\"\\']+aardman[^\"\\']*\\.(?:jpg|jpeg|png|webp)', html, re.IGNORECASE)
          if m:
            print(m.group(0))
          else:
            # Try og:image from first result page
            m = re.search(r'<meta[^>]+property=[\"\\']og:image[\"\\'][^>]+content=[\"\\']([^\"\\']+)', html)
            if m:
              print(m.group(1))
          ")
          echo "Aardman image: $IMG"
          if [ -n "$IMG" ]; then
            curl -s -X POST https://coins.ghghome.co.uk/api/inbox-image-update \
              -H "Content-Type: application/json" \
              -H "x-service-key: ${{ secrets.COINHUB_SERVICE_KEY }}" \
              -d "{\"variantCode\":\"UK-D-50P-2026-AARD-\",\"imageUrl\":\"$IMG\"}"
          else
            echo "No image found for Aardman"
          fi
