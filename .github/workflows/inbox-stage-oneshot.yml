name: Stage coin to inbox (one-shot)

on:
  workflow_dispatch:

jobs:
  stage:
    runs-on: ubuntu-latest
    steps:
      - name: Stage coin to NewCoinsInbox
        run: |
          curl -s -X POST https://coins.ghghome.co.uk/api/inbox-stage \
            -H "Content-Type: application/json" \
            -H "x-service-key: ${{ secrets.COINHUB_SERVICE_KEY }}" \
            -d '{
              "coins": [{
                "variantCode": "UK-COMM-50P-2026-WTPF-",
                "name": "Winnie the Pooh Friendship",
                "denomination": "50p",
                "collection": "Commemorative",
                "monarch": "King Charles III",
                "year": 2026,
                "imageUrl": "",
                "sourceUrl": "https://www.westminstercollection.com/p-177L/2026-UK-Winnie-the-Pooh-Friendship-CBU-50p.aspx",
                "price": ""
              }]
            }'
