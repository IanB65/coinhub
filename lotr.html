<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Lord of the Rings · 50p Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:  #8B6914;
  --gold2: #C49A2A;
  --gold3: #F0C84A;
  --got:   #2D6A4F;
  --got-bg:#D8F3DC;
}

html { scroll-behavior: smooth; }

body {
  background: #060402;
  color: #e8dfc8;
  font-family: 'Cormorant Garamond', serif;
  overflow-x: hidden;
}

/* ── BACK LINK ── */
.back-link {
  position: fixed;
  top: 1.25rem;
  left: 1.5rem;
  z-index: 100;
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .06em;
  color: rgba(240,200,74,.7);
  text-decoration: none;
  transition: color .2s;
}
.back-link:hover { color: var(--gold3); }

/* ── HERO ── */
.hero {
  position: relative;
  width: 100%;
  height: 100dvh;
  min-height: 500px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Photo background */
.hero-bg {
  position: absolute;
  inset: 0;
  background: url('/images/Mordor%27s_DuoSpire.webp') center top / cover no-repeat;
  will-change: transform;
}
/* Fallback gradient when image hasn't loaded yet */
.hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 120% 60% at 50% 110%, #7a2800 0%, #3d1200 30%, #0a0300 65%, #020100 100%);
  z-index: -1;
}
/* Base darkness overlay on photo */
.hero-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.42);
}

/* Scroll-driven darkness — opacity set by JS */
#scrollDark {
  position: absolute;
  inset: 0;
  background: #000;
  opacity: 0;
  z-index: 13;
  pointer-events: none;
}

/* Canvas smoke */
#smokeCanvas {
  position: absolute;
  inset: 0;
  z-index: 14;
  pointer-events: none;
  width: 100%;
  height: 100%;
}

/* Fire base */
.hero-fire {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 22%;
  z-index: 15;
  pointer-events: none;
}
.fire-tongue {
  position: absolute;
  bottom: 0;
  border-radius: 50% 50% 40% 40%;
  animation: fireDance ease-in-out infinite alternate;
  transform-origin: bottom center;
}
@keyframes fireDance {
  0%   { transform: scaleX(1)   scaleY(1)   skewX(0deg); opacity: .85; }
  100% { transform: scaleX(.8)  scaleY(1.25) skewX(6deg); opacity: .5; }
}

/* Content (coin + title) */
.hero-content {
  position: relative;
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.25rem;
  text-align: center;
  padding: 1rem;
  pointer-events: none;
  margin-top: -6vh;
}

.hero-title {
  font-family: 'Bodoni Moda', serif;
  font-size: clamp(1.1rem, 3.5vw, 2rem);
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold3);
  text-shadow: 0 0 40px rgba(240,200,74,.5), 0 2px 6px rgba(0,0,0,.9);
  line-height: 1.3;
}

.hero-subtitle {
  font-family: 'DM Mono', monospace;
  font-size: clamp(.55rem, 1.5vw, .75rem);
  letter-spacing: .25em;
  text-transform: uppercase;
  color: rgba(240,200,74,.5);
  margin-top: -.5rem;
}

.hero-coin {
  width: clamp(160px, 28vw, 280px);
  height: clamp(160px, 28vw, 280px);
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  animation: coinFloat 4s ease-in-out infinite;
  filter: drop-shadow(0 0 35px rgba(196,154,42,.5)) drop-shadow(0 6px 24px rgba(0,0,0,.8));
}
@keyframes coinFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}
.hero-coin img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: transparent;
}
.hero-coin-svg { width: 100%; height: 100%; }

/* Scroll indicator */
.scroll-hint {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .4rem;
  transition: opacity .4s;
}
.scroll-hint span {
  font-family: 'DM Mono', monospace;
  font-size: .55rem;
  letter-spacing: .12em;
  color: rgba(240,200,74,.4);
  text-transform: uppercase;
}
.scroll-chevron {
  width: 16px;
  height: 16px;
  border-right: 1.5px solid rgba(240,200,74,.4);
  border-bottom: 1.5px solid rgba(240,200,74,.4);
  transform: rotate(45deg);
  animation: chevronBounce 1.8s ease-in-out infinite;
}
@keyframes chevronBounce {
  0%,100% { transform: rotate(45deg) translateY(0); opacity: .4; }
  50%      { transform: rotate(45deg) translateY(5px); opacity: .8; }
}

/* ── DESCRIPTION SECTION ── */
.desc-section {
  background: #060301;
  padding: clamp(4rem, 10vw, 8rem) 1.5rem;
  display: flex;
  justify-content: center;
}
.desc-inner {
  max-width: 680px;
  width: 100%;
}
.desc-label {
  font-family: 'DM Mono', monospace;
  font-size: .6rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 2rem;
  display: block;
}
.desc-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.8rem, 5vw, 2.6rem);
  font-weight: 400;
  line-height: 1.45;
}
/* Burn reveal: each word starts near-black, ignites to orange */
.desc-text .word {
  display: inline-block;
  color: #1a0800;
  text-shadow: none;
  transition: color .6s ease, text-shadow .6s ease;
}
.desc-text .word.visible {
  color: #e05a00;
  text-shadow: 0 0 20px rgba(224,90,0,.55), 0 0 6px rgba(180,60,0,.4);
}

/* ── SERIES SECTION ── */
.series-section {
  background: #040201;
  padding: clamp(3rem, 8vw, 6rem) 0 clamp(4rem, 10vw, 8rem);
}
.series-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1.5rem;
}
.series-heading {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: .75rem;
}
.series-subheading {
  font-family: 'Bodoni Moda', serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 700;
  color: #e8dfc8;
  margin-bottom: 2.5rem;
}
/* Flex wrap — laps to next row when space runs out */
.series-track {
  display: flex;
  flex-wrap: wrap;
  gap: 1.25rem;
}

.series-card {
  flex: 0 0 160px;
  border-radius: 4px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(24px);
  transition: opacity .5s ease, transform .5s ease;
}
.series-card.visible {
  opacity: 1;
  transform: translateY(0);
}
.series-card.owned {
  border: 1px solid rgba(240,200,74,.5);
  background: #13100a;
}
.series-card.owned:hover {
  box-shadow: 0 0 24px rgba(196,154,42,.25);
  border-color: rgba(240,200,74,.8);
}
.series-card.future {
  border: 1px dashed rgba(120,110,90,.35);
  background: #0d0b08;
  filter: grayscale(1) opacity(.4);
}
.series-card-img {
  width: 100%;
  aspect-ratio: 1;
  background: #1a1509;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.series-card-img img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: .5rem;
}
.series-card-body { padding: .65rem .7rem .75rem; }
.series-card-num {
  font-family: 'DM Mono', monospace;
  font-size: .5rem;
  letter-spacing: .12em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: .25rem;
}
.series-card.future .series-card-num { color: rgba(139,105,20,.5); }
.series-card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: .9rem;
  font-weight: 600;
  color: #e8dfc8;
  line-height: 1.25;
  margin-bottom: .3rem;
}
.series-card.future .series-card-name { color: rgba(232,223,200,.5); }
.series-card-release {
  font-family: 'DM Mono', monospace;
  font-size: .48rem;
  letter-spacing: .08em;
  color: rgba(139,105,20,.6);
}
.series-card-badge {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: .45rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 10px;
  background: var(--got-bg);
  color: var(--got);
  margin-bottom: .3rem;
}

@media (max-width: 767px) {
  .back-link { top: .85rem; left: 1rem; }
  .series-card { flex: 0 0 140px; }
}
</style>
</head>
<body>

<a href="/CoinHub_v2.html" class="back-link" id="backLink">← Back to Collection</a>

<!-- HERO -->
<section class="hero" id="hero">
  <!-- Photo background + overlays -->
  <div class="hero-bg" id="heroBg" data-speed="0.08"></div>

  <!-- Scroll darkness (JS-driven) -->
  <div id="scrollDark"></div>

  <!-- Canvas smoke -->
  <canvas id="smokeCanvas"></canvas>

  <!-- Fire at base -->
  <div class="hero-fire">
    <div class="fire-tongue" style="left:2%;width:130px;height:110px;background:radial-gradient(ellipse at 50% 85%, #c84800 0%, #7a1a00 40%, transparent 70%);animation-duration:2.1s;animation-delay:0s;"></div>
    <div class="fire-tongue" style="left:14%;width:95px;height:85px;background:radial-gradient(ellipse at 50% 85%, #e05a00 0%, #8c2200 40%, transparent 70%);animation-duration:1.8s;animation-delay:-.3s;"></div>
    <div class="fire-tongue" style="left:26%;width:160px;height:140px;background:radial-gradient(ellipse at 50% 85%, #d44000 0%, #7a1800 40%, transparent 70%);animation-duration:2.4s;animation-delay:-.7s;"></div>
    <div class="fire-tongue" style="left:44%;width:110px;height:100px;background:radial-gradient(ellipse at 50% 85%, #cc3800 0%, #6e1200 40%, transparent 70%);animation-duration:1.9s;animation-delay:-1.1s;"></div>
    <div class="fire-tongue" style="left:58%;width:190px;height:160px;background:radial-gradient(ellipse at 50% 85%, #d84200 0%, #7c1a00 40%, transparent 70%);animation-duration:2.7s;animation-delay:-.4s;"></div>
    <div class="fire-tongue" style="left:75%;width:115px;height:105px;background:radial-gradient(ellipse at 50% 85%, #c03600 0%, #6a1000 40%, transparent 70%);animation-duration:2.0s;animation-delay:-.9s;"></div>
    <div class="fire-tongue" style="left:88%;width:140px;height:120px;background:radial-gradient(ellipse at 50% 85%, #d04000 0%, #741600 40%, transparent 70%);animation-duration:2.3s;animation-delay:-.2s;"></div>
  </div>

  <!-- Content: title + coin -->
  <div class="hero-content">
    <div class="hero-title">The Lord of the Rings</div>
    <div class="hero-subtitle">UK 50p · 2026 · Royal Mint</div>
    <div class="hero-coin" id="heroCoin"></div>
  </div>

  <!-- Scroll hint -->
  <div class="scroll-hint" id="scrollHint">
    <span>Scroll</span>
    <div class="scroll-chevron"></div>
  </div>
</section>

<!-- DESCRIPTION -->
<section class="desc-section">
  <div class="desc-inner">
    <span class="desc-label">The Collection</span>
    <p class="desc-text" id="descText">
      In 2026 the Royal Mint marks the enduring legend of Middle-earth. Seven fifty-pence pieces. Seven chapters of a story that has never truly ended.
    </p>
  </div>
</section>

<!-- SERIES -->
<section class="series-section">
  <div class="series-inner">
    <div class="series-heading">The Seven Coins</div>
    <div class="series-subheading">Complete the Set</div>
    <div class="series-track" id="seriesTrack"></div>
  </div>
</section>

<script>
// ── VARIANT DATA ──────────────────────────────────────────────────────────────
const VARIANTS = {
  'UK-D-50P-2026-LOTB-': {
    label:   'Brilliant Uncirculated',
    mintage: null,
    status:  'Got',
    image:   'https://crawleycoins.co.uk/wp-content/uploads/2026/05/UK26LRCBU-The-Lord-of-the-Rings-2026-UK-50p-Brilliant-Uncirculated-Coin-Reverse.jpg',
  },
  'UK-D-50P-2026-LOTC-': {
    label:   'Colour Brilliant Uncirculated',
    mintage: '20,000',
    status:  'Need',
    image:   'https://www.royalmint.com/globalassets/_ecommerce/commemorative/launches/2026-launches/lord-of-the-rings/coin-1---completer/product-images/uk26lrcbuc---the-lord-of-the-rings-2026-uk-50p-brilliant-uncirculated-colour-coin-reverse-edge.jpg',
  },
  'UK-D-50P-2026-LOTS-': {
    label:   'Silver Proof',
    mintage: '7,500',
    status:  'Got',
    image:   '/images/UK26LRCSPC_-_The_Lord_of_the_Rings_2026_UK_50p_Silver_Proof_Colour_Coin_Reverse_Edge__40243.png',
    imageFallback: 'https://www.royalmint.com/globalassets/_ecommerce/commemorative/launches/2026-launches/lord-of-the-rings/one-ring-silver-1500x1500.jpg',
  },
};

const urlVc = new URLSearchParams(location.search).get('vc');
const selectedVc = VARIANTS[urlVc] ? urlVc : 'UK-D-50P-2026-LOTB-';
const selected = VARIANTS[selectedVc];

// Back link
const backLink = document.getElementById('backLink');
if (urlVc && VARIANTS[urlVc]) {
  backLink.href = '/CoinHub_v2.html#collection/Lord%20of%20the%20Rings';
  backLink.textContent = '← Back to Lord of the Rings';
} else {
  backLink.href = '/CoinHub_v2.html';
  backLink.textContent = '← Back to Collection';
}

// ── SERIES DATA ────────────────────────────────────────────────────────────────
const SERIES = [
  { num: 1, name: 'The One Ring', year: 2026, owned: true,  release: null,            vc: selectedVc },
  { num: 2, name: 'TBC',         year: 2026, owned: false, release: 'Expected 2026' },
  { num: 3, name: 'TBC',         year: 2026, owned: false, release: 'Expected 2026' },
  { num: 4, name: 'TBC',         year: 2026, owned: false, release: 'Expected 2027' },
  { num: 5, name: 'TBC',         year: 2027, owned: false, release: 'Expected 2027' },
  { num: 6, name: 'TBC',         year: 2027, owned: false, release: 'Expected 2027' },
  { num: 7, name: 'TBC',         year: 2027, owned: false, release: 'Expected 2027' },
];

// ── COIN IMAGE ────────────────────────────────────────────────────────────────
function getCoinImage(vc) {
  try {
    const raw = localStorage.getItem('coinhub_gs_cache');
    if (raw) {
      const cache = JSON.parse(raw);
      const coins = cache?.data?.variants || cache?.variants || [];
      const match = coins.find(c => c.variantCode === vc || c[0] === vc);
      if (match) { const u = Array.isArray(match) ? match[7] : match.imageUrl; if (u) return u; }
    }
  } catch(e) {}
  return VARIANTS[vc]?.image || null;
}

function goldCoinSVG(label) {
  return `<svg class="hero-coin-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="cg" cx="40%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#f0c84a"/>
        <stop offset="45%" stop-color="#c49a2a"/>
        <stop offset="100%" stop-color="#6b4e10"/>
      </radialGradient>
    </defs>
    <circle cx="100" cy="100" r="98" fill="#4a3208"/>
    <circle cx="100" cy="100" r="95" fill="url(#cg)"/>
    <circle cx="100" cy="100" r="82" fill="none" stroke="#8b6914" stroke-width="1.5"/>
    <text x="100" y="108" font-family="Bodoni Moda, serif" font-size="26" font-weight="700" fill="#2a1e06" text-anchor="middle" letter-spacing="2">${label}</text>
    <text x="100" y="130" font-family="DM Mono, monospace" font-size="8" fill="#4a3208" text-anchor="middle" letter-spacing="3">ROYAL MINT</text>
  </svg>`;
}

function seriesPlaceholderSVG(num) {
  return `<svg width="100%" height="100%" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(139,105,20,.25)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="60" y="65" font-family="Bodoni Moda, serif" font-size="20" fill="rgba(139,105,20,.3)" text-anchor="middle">${num}</text>
  </svg>`;
}

// ── RENDER HERO COIN ──────────────────────────────────────────────────────────
const heroCoin = document.getElementById('heroCoin');
const heroImgUrl = getCoinImage(selectedVc);
if (heroImgUrl) {
  const img = document.createElement('img');
  img.alt = selected.label;
  img.onerror = () => {
    // Try fallback URL if defined (e.g. local PNG not uploaded yet)
    if (selected.imageFallback && img.src !== selected.imageFallback) {
      img.src = selected.imageFallback;
    } else {
      heroCoin.innerHTML = goldCoinSVG('50p');
    }
  };
  img.src = heroImgUrl;
  heroCoin.appendChild(img);
} else {
  heroCoin.innerHTML = goldCoinSVG('50p');
}

// Variant label + status + mintage
const heroContent = document.querySelector('.hero-content');
const vInfo = document.createElement('div');
vInfo.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:.4rem;margin-top:-.25rem;';
const sc = selected.status === 'Got' ? '#2D6A4F' : '#9B2335';
const sb = selected.status === 'Got' ? '#D8F3DC' : '#FFE4E8';
vInfo.innerHTML = `
  <span style="font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;color:var(--gold3);">${selected.label}</span>
  <span style="font-family:'DM Mono',monospace;font-size:.5rem;padding:2px 8px;border-radius:10px;background:${sb};color:${sc};">${selected.status === 'Got' ? 'In Collection' : 'Wanted'}</span>
  ${selected.mintage ? `<span style="font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.1em;color:rgba(240,200,74,.5);">Mintage: ${selected.mintage}</span>` : ''}`;
heroContent.appendChild(vInfo);

// ── RENDER SERIES CARDS ───────────────────────────────────────────────────────
const track = document.getElementById('seriesTrack');
SERIES.forEach((coin, i) => {
  const card = document.createElement('div');
  card.className = 'series-card ' + (coin.owned ? 'owned' : 'future');
  card.style.transitionDelay = (i * 0.08) + 's';
  const cardImg = coin.vc ? getCoinImage(coin.vc) : null;
  const ph = seriesPlaceholderSVG(coin.num).replace(/'/g, "\\'");
  const imgHtml = coin.owned && cardImg
    ? `<img src="${cardImg}" alt="${coin.name}" onerror="this.parentElement.innerHTML='${ph}';">`
    : seriesPlaceholderSVG(coin.num);
  card.innerHTML = `
    <div class="series-card-img">${imgHtml}</div>
    <div class="series-card-body">
      <div class="series-card-num">Coin ${coin.num} of 7</div>
      ${coin.owned ? '<span class="series-card-badge">In Collection</span>' : ''}
      <div class="series-card-name">${coin.name}</div>
      ${coin.release ? `<div class="series-card-release">${coin.release}</div>` : ''}
    </div>`;
  track.appendChild(card);
});

// ── CANVAS SMOKE ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('smokeCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const particles = [];

function spawnParticle() {
  const side = Math.random();
  particles.push({
    x:       canvas.width * (0.05 + Math.random() * 0.9),
    y:       canvas.height * (0.55 + Math.random() * 0.45),
    r:       18 + Math.random() * 28,
    vx:      (Math.random() - 0.5) * 0.35,
    vy:      -(0.35 + Math.random() * 0.65),
    opacity: 0,
    maxOp:   0.08 + Math.random() * 0.14,
    life:    0,
    maxLife: 280 + Math.random() * 220,
    phase:   Math.random() * Math.PI * 2,
    drift:   (Math.random() - 0.5) * 0.006,
  });
}

// Pre-populate
for (let i = 0; i < 55; i++) {
  spawnParticle();
  // Scatter initial life so they don't all start at the same point
  particles[i].life = Math.random() * particles[i].maxLife;
  particles[i].y -= particles[i].vy * particles[i].life;
}

function drawSmoke() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Spawn replacement particles
  if (particles.length < 60) spawnParticle();

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life++;
    p.phase += p.drift;
    p.x += p.vx + Math.sin(p.phase) * 0.4;
    p.y += p.vy;
    p.r  += 0.18;

    const progress = p.life / p.maxLife;
    // Fade in then out
    p.opacity = progress < 0.2
      ? (progress / 0.2) * p.maxOp
      : progress > 0.65
        ? ((1 - progress) / 0.35) * p.maxOp
        : p.maxOp;

    if (p.life >= p.maxLife) { particles.splice(i, 1); spawnParticle(); continue; }

    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    grad.addColorStop(0,   `rgba(55,42,32,${p.opacity})`);
    grad.addColorStop(0.5, `rgba(40,30,22,${p.opacity * 0.6})`);
    grad.addColorStop(1,   `rgba(20,14,10,0)`);

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  requestAnimationFrame(drawSmoke);
}
drawSmoke();

// ── PARALLAX + SCROLL DARKNESS ────────────────────────────────────────────────
const heroEl   = document.getElementById('hero');
const heroBg   = document.getElementById('heroBg');
const scrollDark = document.getElementById('scrollDark');
const scrollHint = document.getElementById('scrollHint');

function onScroll() {
  const y = window.scrollY;
  const h = heroEl.offsetHeight;
  if (y <= h) {
    // Photo parallax — moves slower than scroll = depth effect
    heroBg.style.transform = `translateY(${y * 0.08}px)`;
    // Darkness grows as you descend — reaches 0.72 at hero bottom
    scrollDark.style.opacity = Math.min(y / h * 1.1, 0.72);
    scrollHint.style.opacity = y > 80 ? '0' : '1';
  }
}
window.addEventListener('scroll', onScroll, { passive: true });

// ── SPLIT TEXT — BURN REVEAL ──────────────────────────────────────────────────
const descEl = document.getElementById('descText');
const words = descEl.textContent.trim().split(/\s+/);
descEl.innerHTML = words.map((w, i) =>
  `<span class="word" style="transition-delay:${i * 0.05}s">${w}</span>`
).join(' ');

// ── INTERSECTION OBSERVER ─────────────────────────────────────────────────────
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    if (e.target.classList.contains('desc-text')) {
      e.target.querySelectorAll('.word').forEach(w => w.classList.add('visible'));
    } else {
      e.target.classList.add('visible');
    }
    io.unobserve(e.target);
  });
}, { threshold: 0.15 });

io.observe(descEl);
document.querySelectorAll('.series-card').forEach(c => io.observe(c));
</script>
