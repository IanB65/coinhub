<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Lord of the Rings · 50p Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:  #8B6914;
  --gold2: #C49A2A;
  --gold3: #F0C84A;
  --got:   #2D6A4F;
  --got-bg:#D8F3DC;
  --ink:   #0C0C0A;
  --paper: #F5F2EB;
  --r:     3px;
}

html { scroll-behavior: smooth; }

body {
  background: #060402;
  color: #e8dfc8;
  font-family: 'Cormorant Garamond', serif;
  overflow-x: hidden;
}

/* ── BACK LINK ── */
.back-link {
  position: fixed;
  top: 1.25rem;
  left: 1.5rem;
  z-index: 100;
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .06em;
  color: rgba(240,200,74,.7);
  text-decoration: none;
  transition: color .2s;
}
.back-link:hover { color: var(--gold3); }

/* ── HERO ── */
.hero {
  position: relative;
  width: 100%;
  height: 100dvh;
  min-height: 500px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero-layer {
  position: absolute;
  inset: 0;
  will-change: transform;
}

/* Sky */
.hero-sky {
  background:
    radial-gradient(ellipse 120% 60% at 50% 110%, #7a2800 0%, #3d1200 30%, #0a0300 65%, #020100 100%);
}

/* Horizon glow */
.hero-sky::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 35%;
  background: radial-gradient(ellipse 80% 100% at 50% 100%, rgba(180,60,0,.45) 0%, transparent 70%);
}

/* Far mountains */
.hero-mtns-far {
  bottom: 0;
  top: auto;
  height: 55%;
}
.hero-mtns-far svg { width: 100%; height: 100%; }

/* Tower */
.hero-tower {
  bottom: 0;
  top: auto;
  left: 55%;
  width: 220px;
  height: 70%;
  transform: translateX(-50%);
}
.hero-tower svg { width: 100%; height: 100%; }

/* Tower eye glow */
.eye-glow {
  position: absolute;
  top: 6%;
  left: 50%;
  transform: translateX(-50%);
  width: 18px;
  height: 10px;
  background: #ff6b00;
  border-radius: 50%;
  box-shadow: 0 0 12px 6px #ff4400, 0 0 40px 20px rgba(255,80,0,.4), 0 0 80px 40px rgba(200,40,0,.2);
  animation: eyePulse 2.5s ease-in-out infinite;
}
@keyframes eyePulse {
  0%,100% { opacity: .8; box-shadow: 0 0 12px 6px #ff4400, 0 0 40px 20px rgba(255,80,0,.4), 0 0 80px 40px rgba(200,40,0,.2); }
  50%      { opacity: 1;  box-shadow: 0 0 16px 8px #ff6600, 0 0 60px 30px rgba(255,100,0,.55), 0 0 120px 60px rgba(220,60,0,.3); }
}

/* Mid mountains */
.hero-mtns-mid {
  bottom: 0;
  top: auto;
  height: 42%;
}
.hero-mtns-mid svg { width: 100%; height: 100%; }

/* Smoke blobs */
.hero-smoke {
  bottom: 28%;
  top: auto;
  height: 40%;
  pointer-events: none;
}
.smoke-blob {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(60,45,35,.55) 0%, transparent 70%);
  animation: smokeDrift linear infinite;
}
@keyframes smokeDrift {
  0%   { transform: translateY(0) translateX(0) scale(1); opacity: .6; }
  40%  { transform: translateY(-30%) translateX(8%) scale(1.15); opacity: .45; }
  70%  { transform: translateY(-55%) translateX(-5%) scale(1.3); opacity: .25; }
  100% { transform: translateY(-85%) translateX(4%) scale(1.5); opacity: 0; }
}

/* Fire base */
.hero-fire {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 28%;
  pointer-events: none;
}
.fire-tongue {
  position: absolute;
  bottom: 0;
  border-radius: 50% 50% 40% 40%;
  animation: fireDance ease-in-out infinite alternate;
  transform-origin: bottom center;
}
@keyframes fireDance {
  0%   { transform: scaleX(1)   scaleY(1)   skewX(0deg); opacity: .9; }
  100% { transform: scaleX(.85) scaleY(1.2) skewX(5deg); opacity: .6; }
}

/* Content (coin + title) */
.hero-content {
  position: relative;
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  text-align: center;
  padding: 1rem;
  pointer-events: none;
  margin-top: -8vh;
}

.hero-title {
  font-family: 'Bodoni Moda', serif;
  font-size: clamp(1.1rem, 3.5vw, 2rem);
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold3);
  text-shadow: 0 0 30px rgba(240,200,74,.4), 0 2px 4px rgba(0,0,0,.8);
  line-height: 1.3;
}

.hero-subtitle {
  font-family: 'DM Mono', monospace;
  font-size: clamp(.55rem, 1.5vw, .75rem);
  letter-spacing: .25em;
  text-transform: uppercase;
  color: rgba(240,200,74,.55);
  margin-top: -.75rem;
}

.hero-coin {
  width: clamp(160px, 28vw, 280px);
  height: clamp(160px, 28vw, 280px);
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  animation: coinFloat 4s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(196,154,42,.45)) drop-shadow(0 4px 20px rgba(0,0,0,.7));
}
@keyframes coinFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}
.hero-coin img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #1a1206;
}
.hero-coin-svg {
  width: 100%;
  height: 100%;
}

/* Scroll indicator */
.scroll-hint {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .4rem;
  transition: opacity .4s;
}
.scroll-hint span {
  font-family: 'DM Mono', monospace;
  font-size: .55rem;
  letter-spacing: .12em;
  color: rgba(240,200,74,.4);
  text-transform: uppercase;
}
.scroll-chevron {
  width: 16px;
  height: 16px;
  border-right: 1.5px solid rgba(240,200,74,.4);
  border-bottom: 1.5px solid rgba(240,200,74,.4);
  transform: rotate(45deg);
  animation: chevronBounce 1.8s ease-in-out infinite;
}
@keyframes chevronBounce {
  0%,100% { transform: rotate(45deg) translateY(0); opacity: .4; }
  50%      { transform: rotate(45deg) translateY(5px); opacity: .8; }
}

/* ── DESCRIPTION SECTION ── */
.desc-section {
  background: #080502;
  padding: clamp(4rem, 10vw, 8rem) 1.5rem;
  display: flex;
  justify-content: center;
}
.desc-inner {
  max-width: 680px;
  width: 100%;
}
.desc-label {
  font-family: 'DM Mono', monospace;
  font-size: .6rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 2rem;
  display: block;
}
.desc-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.8rem, 5vw, 2.6rem);
  font-weight: 400;
  line-height: 1.45;
  color: #e8dfc8;
}
.desc-text .word {
  display: inline-block;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity .5s ease, transform .5s ease;
}
.desc-text .word.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ── SERIES SECTION ── */
.series-section {
  background: #060402;
  padding: clamp(3rem, 8vw, 6rem) 0 clamp(4rem, 10vw, 8rem);
}
.series-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 1.5rem;
}
.series-heading {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: .75rem;
}
.series-subheading {
  font-family: 'Bodoni Moda', serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 700;
  color: #e8dfc8;
  margin-bottom: 2.5rem;
}
.series-track {
  display: flex;
  gap: 1.25rem;
  overflow-x: auto;
  padding-bottom: 1rem;
  scrollbar-width: thin;
  scrollbar-color: rgba(139,105,20,.3) transparent;
}
.series-track::-webkit-scrollbar { height: 4px; }
.series-track::-webkit-scrollbar-track { background: transparent; }
.series-track::-webkit-scrollbar-thumb { background: rgba(139,105,20,.35); border-radius: 2px; }

.series-card {
  flex: 0 0 160px;
  border-radius: 4px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(24px);
  transition: opacity .5s ease, transform .5s ease;
}
.series-card.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Owned card */
.series-card.owned {
  border: 1px solid rgba(240,200,74,.5);
  background: #13100a;
}
.series-card.owned:hover {
  box-shadow: 0 0 24px rgba(196,154,42,.25);
  border-color: rgba(240,200,74,.8);
}

/* Future card */
.series-card.future {
  border: 1px dashed rgba(120,110,90,.35);
  background: #0d0b08;
  filter: grayscale(1) opacity(.4);
}

.series-card-img {
  width: 100%;
  aspect-ratio: 1;
  background: #1a1509;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.series-card-img img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: .5rem;
}
.series-card-body {
  padding: .65rem .7rem .75rem;
}
.series-card-num {
  font-family: 'DM Mono', monospace;
  font-size: .5rem;
  letter-spacing: .12em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: .25rem;
}
.series-card.future .series-card-num { color: rgba(139,105,20,.5); }
.series-card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: .9rem;
  font-weight: 600;
  color: #e8dfc8;
  line-height: 1.25;
  margin-bottom: .3rem;
}
.series-card.future .series-card-name { color: rgba(232,223,200,.5); }
.series-card-release {
  font-family: 'DM Mono', monospace;
  font-size: .48rem;
  letter-spacing: .08em;
  color: rgba(139,105,20,.6);
}
.series-card-badge {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: .45rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 10px;
  background: var(--got-bg);
  color: var(--got);
  margin-bottom: .3rem;
}

@media (max-width: 767px) {
  .back-link { top: .85rem; left: 1rem; }
  .hero-tower { left: 58%; width: 150px; }
  .series-card { flex: 0 0 140px; }
}
</style>
</head>
<body>

<a href="/CoinHub_v2.html" class="back-link" id="backLink">← Back to Collection</a>

<!-- HERO -->
<section class="hero" id="hero">
  <!-- Layer 1: sky -->
  <div class="hero-layer hero-sky" data-speed="0"></div>

    <svg viewBox="0 0 1440 400" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

<!-- DESCRIPTION -->

<script>
// ── VARIANT DATA ──────────────────────────────────────────────────────────────
const VARIANTS = {
  'UK-D-50P-2026-LOTB-': {
    label:    'Brilliant Uncirculated',
    mintage:  null,
    status:   'Got',
    image:    'https://crawleycoins.co.uk/wp-content/uploads/2026/05/UK26LRCBU-The-Lord-of-the-Rings-2026-UK-50p-Brilliant-Uncirculated-Coin-Reverse.jpg',
  },
  'UK-D-50P-2026-LOTC-': {
    label:    'Colour Brilliant Uncirculated',
    mintage:  '20,000',
    status:   'Need',
    image:    'https://www.royalmint.com/globalassets/_ecommerce/commemorative/launches/2026-launches/lord-of-the-rings/coin-1---completer/product-images/uk26lrcbuc---the-lord-of-the-rings-2026-uk-50p-brilliant-uncirculated-colour-coin-reverse-edge.jpg',
  },
  'UK-D-50P-2026-LOTS-': {
    label:    'Silver Proof',
    mintage:  '7,500',
    status:   'Got',
    image:    'https://www.royalmint.com/globalassets/_ecommerce/commemorative/launches/2026-launches/lord-of-the-rings/one-ring-silver-1500x1500.jpg',
  },
};

// Selected variant from URL param, default to BU
const urlVc = new URLSearchParams(location.search).get('vc');
const selectedVc = VARIANTS[urlVc] ? urlVc : 'UK-D-50P-2026-LOTB-';
const selected = VARIANTS[selectedVc];

// Back link: variant page → LOTR collection, /lotr → main gallery
const backLink = document.getElementById('backLink');
if (urlVc && VARIANTS[urlVc]) {
  backLink.href = '/CoinHub_v2.html#collection/Lord%20of%20the%20Rings';
  backLink.textContent = '← Back to Lord of the Rings';
} else {
  backLink.href = '/CoinHub_v2.html';
  backLink.textContent = '← Back to Collection';
}

// ── SERIES DATA ────────────────────────────────────────────────────────────────
const SERIES = [
  { num: 1, name: 'The One Ring',   year: 2026, owned: true,  release: null,            vc: selectedVc },
  { num: 2, name: 'TBC',            year: 2026, owned: false, release: 'Expected 2026' },
  { num: 3, name: 'TBC',            year: 2026, owned: false, release: 'Expected 2026' },
  { num: 4, name: 'TBC',            year: 2026, owned: false, release: 'Expected 2027' },
  { num: 5, name: 'TBC',            year: 2027, owned: false, release: 'Expected 2027' },
  { num: 6, name: 'TBC',            year: 2027, owned: false, release: 'Expected 2027' },
  { num: 7, name: 'TBC',            year: 2027, owned: false, release: 'Expected 2027' },
];

// ── COIN IMAGE (localStorage cache first, hardcoded fallback) ─────────────────
function getCoinImage(vc) {
  try {
    const raw = localStorage.getItem('coinhub_gs_cache');
    if (raw) {
      const cache = JSON.parse(raw);
      const coins = cache?.data?.variants || cache?.variants || [];
      const match = coins.find(c => c.variantCode === vc || c[0] === vc);
      if (match) {
        const url = Array.isArray(match) ? match[7] : match.imageUrl;
        if (url) return url;
      }
    }
  } catch(e) {}
  return VARIANTS[vc]?.image || null;
}

function goldCoinSVG(label) {
  return `<svg class="hero-coin-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="cg" cx="40%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#f0c84a"/>
        <stop offset="45%" stop-color="#c49a2a"/>
        <stop offset="100%" stop-color="#6b4e10"/>
      </radialGradient>
      <radialGradient id="cg2" cx="40%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#d4a820"/>
        <stop offset="100%" stop-color="#4a3208"/>
      </radialGradient>
    </defs>
    <circle cx="100" cy="100" r="98" fill="#4a3208"/>
    <circle cx="100" cy="100" r="95" fill="url(#cg)"/>
    <circle cx="100" cy="100" r="82" fill="none" stroke="#8b6914" stroke-width="1.5"/>
    <circle cx="100" cy="100" r="75" fill="url(#cg2)" opacity=".6"/>
    <text x="100" y="108" font-family="Bodoni Moda, serif" font-size="26" font-weight="700" fill="#2a1e06" text-anchor="middle" letter-spacing="2">${label}</text>
    <text x="100" y="130" font-family="DM Mono, monospace" font-size="8" fill="#4a3208" text-anchor="middle" letter-spacing="3">ROYAL MINT</text>
  </svg>`;
}

function seriesCardPlaceholderSVG(num) {
  return `<svg width="100%" height="100%" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(139,105,20,.25)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="60" y="65" font-family="Bodoni Moda, serif" font-size="20" fill="rgba(139,105,20,.3)" text-anchor="middle">${num}</text>
  </svg>`;
}

// ── RENDER HERO COIN + VARIANT INFO ──────────────────────────────────────────
const heroCoin = document.getElementById('heroCoin');
const heroImgUrl = getCoinImage(selectedVc);
if (heroImgUrl) {
  const img = document.createElement('img');
  img.src = heroImgUrl;
  img.alt = selected.label;
  img.onerror = () => { heroCoin.innerHTML = goldCoinSVG('50p'); };
  heroCoin.appendChild(img);
} else {
  heroCoin.innerHTML = goldCoinSVG('50p');
}

// Inject variant label + details beneath the coin
const heroContent = document.querySelector('.hero-content');
const variantInfo = document.createElement('div');
variantInfo.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:.4rem;margin-top:-.25rem;';
const statusColour = selected.status === 'Got' ? '#2D6A4F' : '#9B2335';
const statusBg     = selected.status === 'Got' ? '#D8F3DC' : '#FFE4E8';
const mintageHtml  = selected.mintage
  ? `<span style="font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;color:rgba(240,200,74,.5);">Mintage: ${selected.mintage}</span>`
  : '';
variantInfo.innerHTML = `
  <span style="font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;color:var(--gold3);">${selected.label}</span>
  <span style="font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.08em;padding:2px 8px;border-radius:10px;background:${statusBg};color:${statusColour};">${selected.status === 'Got' ? 'In Collection' : 'Wanted'}</span>
  ${mintageHtml}`;
heroContent.appendChild(variantInfo);

// ── RENDER SERIES CARDS ───────────────────────────────────────────────────────
const track = document.getElementById('seriesTrack');
SERIES.forEach((coin, i) => {
  const card = document.createElement('div');
  card.className = 'series-card ' + (coin.owned ? 'owned' : 'future');
  card.style.transitionDelay = (i * 0.08) + 's';

  const cardImgUrl = coin.vc ? getCoinImage(coin.vc) : null;
  const imgHtml = coin.owned && cardImgUrl
    ? `<img src="${cardImgUrl}" alt="${coin.name}" onerror="this.parentElement.innerHTML='${seriesCardPlaceholderSVG(coin.num).replace(/'/g, "\\'")}';">`
    : seriesCardPlaceholderSVG(coin.num);

  card.innerHTML = `
    <div class="series-card-img">${imgHtml}</div>
    <div class="series-card-body">
      <div class="series-card-num">Coin ${coin.num} of 7</div>
      ${coin.owned ? '<span class="series-card-badge">In Collection</span>' : ''}
      <div class="series-card-name">${coin.name}</div>
      ${coin.release ? `<div class="series-card-release">${coin.release}</div>` : ''}
    </div>`;
  track.appendChild(card);
});

// ── PARALLAX ──────────────────────────────────────────────────────────────────
const heroEl = document.getElementById('hero');
const heroH = heroEl.offsetHeight;
const layers = [...document.querySelectorAll('.hero-layer[data-speed]')];
const scrollHint = document.getElementById('scrollHint');

function onScroll() {
  const y = window.scrollY;
  if (y > heroH) return;
  layers.forEach(l => {
    const speed = parseFloat(l.dataset.speed);
    l.style.transform = `translateY(${y * speed}px)`;
  });
  scrollHint.style.opacity = y > 80 ? '0' : '1';
}
window.addEventListener('scroll', onScroll, { passive: true });

// ── SPLIT TEXT ANIMATION ──────────────────────────────────────────────────────
const descEl = document.getElementById('descText');
const words = descEl.textContent.trim().split(/\s+/);
descEl.innerHTML = words.map((w, i) =>
  `<span class="word" style="transition-delay:${i * 0.045}s">${w}</span>`
).join(' ');

// ── INTERSECTION OBSERVER (desc text + series cards) ─────────────────────────
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    if (e.target.classList.contains('desc-text')) {
      e.target.querySelectorAll('.word').forEach(w => w.classList.add('visible'));
    } else {
      e.target.classList.add('visible');
    }
    io.unobserve(e.target);
  });
}, { threshold: 0.15 });

io.observe(descEl);
document.querySelectorAll('.series-card').forEach(c => io.observe(c));
</script>
</body>
</html>
